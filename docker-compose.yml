version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: gst_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gst_system
      MYSQL_USER: gst_user
      MYSQL_PASSWORD: gst_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
